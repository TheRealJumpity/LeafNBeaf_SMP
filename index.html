<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VoidCrushers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family:Inter,Segoe UI,Arial,sans-serif;
}
body{
  min-height:100vh;
  background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
  background-size:300% 300%;
  animation:bg 12s ease infinite;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
}
@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.card{
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:32px;
  max-width:420px;
  width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  text-align:center;
}
h1{
  font-size:28px;
  margin-bottom:10px;
}
p{
  font-size:14px;
  opacity:.85;
  margin-bottom:24px;
}
.buttons{
  display:flex;
  gap:12px;
  justify-content:center;
}
a{
  text-decoration:none;
  padding:12px 20px;
  border-radius:12px;
  font-size:14px;
  transition:.25s;
}
.primary{
  background:#1a73e8;
  color:#fff;
}
.primary:hover{
  background:#3b8cff;
  transform:translateY(-2px);
}
.secondary{
  border:1px solid rgba(255,255,255,.3);
  color:#fff;
}
.secondary:hover{
  background:rgba(255,255,255,.1);
}
footer{
  margin-top:24px;
  font-size:12px;
  opacity:.6;
}
</style>
</head>

<body>
  <div class="card">
    <h1>VoidCrushers</h1>
    <p>A clean, modern site hosted on GitHub Pages.</p>

    <div class="buttons">
      <a class="primary" href="#">Get Started</a>
      <a class="secondary" href="#">Learn More</a>
    </div>

    <footer>
      Created by VoidCrushers Team
    </footer>
  </div>
</body>
</html>
