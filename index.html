<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The LeafNBeef SMP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* Global body settings and cursor */
body{
  min-height:100vh;
  margin:0;
  padding:0;
  font-family: 'Press Start 2P', monospace, Inter,Segoe UI,Arial,sans-serif;
  color: #fff;
  background: #0f2027;
  display:flex;
  flex-direction: column;
  align-items:center;
  cursor: url('c8a6e23d-ccc5-4fae-ab26-9e189fe2c4ae.png'), auto;
  overflow-x: hidden;
}

/* Minecraft block grid background */
#blockGrid{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display: grid;
  grid-template-columns: repeat(20, 1fr);
  grid-template-rows: repeat(12, 1fr);
  z-index: 0;
  pointer-events: none;
}
.block{
  background: linear-gradient(145deg, #3a5a40, #4c7a57);
  border: 1px solid #2c3a30;
  opacity: 0.15;
  animation: float 12s infinite alternate ease-in-out;
}
@keyframes float{
  0% {transform: translateY(0);}
  100% {transform: translateY(-20px);}
}

/* Card styling */
.card{
  background:#111;
  border-radius:18px;
  padding:32px;
  max-width:420px;
  width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  text-align:center;
  position: relative;
  z-index: 10;
  margin-top:50px;
}

h1{font-size:28px;margin-bottom:10px;}
p{font-size:14px;opacity:.85;margin-bottom:24px;}
.buttons{display:flex;gap:12px;justify-content:center;}
a.button{
  text-decoration:none;
  padding:12px 20px;
  border-radius:12px;
  font-size:14px;
  transition:.25s;
  background:#1a73e8;
  color:#fff;
  cursor:pointer;
}
a.button:hover{background:#3b8cff; transform:translateY(-2px);}
footer{margin-top:24px;font-size:12px;opacity:.8;}

/* Minecraft-style popup */
#popup{
  display:none;
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background: linear-gradient(to bottom, #333 0%, #111 100%);
  border: 4px solid #555;
  border-radius:8px;
  padding:24px;
  box-shadow: 0 0 20px #000, 0 0 0 2px #777 inset;
  z-index:1000;
  max-width:80%;
  font-family: 'Press Start 2P', monospace;
  color:#fff;
  text-shadow: 1px 1px #000;
}
#popup h2{
  font-size: 16px;
  margin-bottom: 12px;
}
#popup p{
  font-size:12px;
  line-height:1.4;
}
#popup span.close{
  position:absolute;
  top:8px;
  right:12px;
  cursor:pointer;
  font-weight:bold;
  font-size:18px;
  color:#ff5555;
}

/* Gallery section */
.gallery{
  margin:50px 0;
  display:flex;
  flex-wrap: wrap;
  gap:16px;
  justify-content: center;
  z-index: 10;
  position: relative;
}
.gallery img{
  width:200px;
  height:120px;
  object-fit: cover;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.5);
  transition: transform .3s;
}
.gallery img:hover{
  transform: scale(1.05);
}
</style>

<!-- Google font for pixelated Minecraft feel -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

</head>
<body>

<!-- Minecraft block grid -->
<div id="blockGrid"></div>

<div class="card">
  <h1>The LeafNBeef SMP</h1>
  <p>A Simple vanilla-friendly Minecraft SMP</p>

  <div class="buttons">
    <a class="button" onclick="showPopup('IP: test.ip\\nVersion: Java 1.21.10\\nEnjoy building and exploring the SMP!')">What's the IP?</a>
  </div>

  <footer>Created by Jumpity</footer>
</div>

<!-- Popup -->
<div id="popup">
  <span class="close" onclick="closePopup()">×</span>
  <h2>Minecraft SMP Details</h2>
  <p id="popupText"></p>
</div>

<!-- Minecraft image gallery -->
<div class="gallery">
  <img src="https://i.imgur.com/GoXRuFP.png" alt="Minecraft 1">
  <img src="https://i.imgur.com/X4ORdF7.png" alt="Minecraft 2">
  <img src="https://i.imgur.com/9WjPxYo.png" alt="Minecraft 3">
  <img src="https://i.imgur.com/mUtKTMo.png" alt="Minecraft 4">
  <img src="https://i.imgur.com/l0ONMnD.png" alt="Minecraft 5">
</div>

<script>
// Pop-up functionality
function showPopup(text){
  document.getElementById('popupText').textContent = text;
  document.getElementById('popup').style.display = 'block';
}
function closePopup(){
  document.getElementById('popup').style.display = 'none';
}

// Minecraft block grid setup
const blockGrid = document.getElementById('blockGrid');
const totalBlocks = 20*12;
for(let i=0;i<totalBlocks;i++){
  const block = document.createElement('div');
  block.className='block';
  block.style.animationDuration=(8 + Math.random()*8)+'s';
  blockGrid.appendChild(block);
}

// Auto-update (cache bust)
(function(){
  const links = document.getElementsByTagName('link');
  for(let i=0;i<links.length;i++){
    if(links[i].rel==='stylesheet'){
      links[i].href=links[i].href+'?v='+new Date().getTime();
    }
  }
  const scripts = document.getElementsByTagName('script');
  for(let i=0;i<scripts.length;i++){
    if(scripts[i].src){
      scripts[i].src = scripts[i].src+'?v='+new Date().getTime();
    }
  }
})();
</script>

</body>
</html>
