<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>VoidCrushers Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#111;
  color:#fff;
}
.container{
  max-width:720px;
  margin:0 auto;
  padding:14px;
}
h1{
  text-align:center;
  font-size:20px;
  margin:0 0 10px;
}
.chat{
  background:#1b1b1b;
  border-radius:10px;
  padding:12px;
  height:360px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.bubble{
  max-width:75%;
  padding:10px 14px;
  border-radius:16px;
  font-size:14px;
  line-height:1.35;
}
.user{
  align-self:flex-end;
  background:#1a73e8;
  border-bottom-right-radius:4px;
}
.ai{
  align-self:flex-start;
  background:#333;
  border-bottom-left-radius:4px;
}
.typing{
  font-size:12px;
  opacity:.7;
  padding-left:6px;
}
.inputRow{
  display:flex;
  gap:8px;
  margin-top:10px;
}
input{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
  font-size:14px;
}
button{
  padding:10px 14px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}
.keyboard{
  margin-top:10px;
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:6px;
}
.key{
  background:#2a2a2a;
  border-radius:6px;
  text-align:center;
  padding:8px 0;
  font-size:13px;
  cursor:pointer;
  user-select:none;
}
.key:active{background:#444;}
.key.wide{grid-column:span 2;}
</style>
</head>

<body>
<div class="container">
  <h1>Created by VoidCrushers Team</h1>

  <div id="chat" class="chat">
    <div class="bubble ai">Hello. You can talk to me.</div>
  </div>

  <div class="inputRow">
    <input id="msg" placeholder="Type a message...">
    <button onclick="send()">Send</button>
  </div>

  <div class="keyboard" id="kb"></div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msg");
let lastTopic = "";

function bubble(type,text){
  const d=document.createElement("div");
  d.className="bubble "+type;
  d.textContent=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function typing(show){
  let t=document.getElementById("typing");
  if(show){
    t=document.createElement("div");
    t.id="typing";
    t.className="typing";
    t.textContent="AI is typing...";
    chat.appendChild(t);
    chat.scrollTop=chat.scrollHeight;
  }else if(t){
    t.remove();
  }
}

function aiReply(msg){
  const m=msg.toLowerCase();

  if(m.includes("hello")||m.includes("hi")) return "Hello. What’s on your mind?";
  if(m.includes("who are you")) return "I’m a local AI running entirely in your browser.";
  if(m.includes("how are you")) return "I’m functioning normally. Thanks for asking.";
  if(m.endsWith("?")){
    lastTopic=m;
    return "That’s a good question. What made you think about it?";
  }
  if(m.includes("i think")||m.includes("i feel")){
    lastTopic=m;
    return "That’s an interesting perspective. Want to explain more?";
  }
  if(lastTopic){
    return "Earlier you mentioned something related. Can you expand on that?";
  }
  return "I’m listening. Go on.";
}

function send(){
  const v=input.value.trim();
  if(!v) return;
  bubble("user",v);
  input.value="";
  typing(true);
  setTimeout(()=>{
    typing(false);
    bubble("ai",aiReply(v));
  },600+Math.random()*600);
}

/* On-screen keyboard */
const keys="1234567890qwertyuiopasdfghjklzxcvbnm".split("");
const kb=document.getElementById("kb");

keys.forEach(k=>{
  const d=document.createElement("div");
  d.className="key";
  d.textContent=k;
  d.onclick=()=>input.value+=k;
  kb.appendChild(d);
});

["Space","⌫"].forEach(k=>{
  const d=document.createElement("div");
  d.className="key wide";
  d.textContent=k;
  d.onclick=()=>{
    if(k==="Space") input.value+=" ";
    else input.value=input.value.slice(0,-1);
  };
  kb.appendChild(d);
});
</script>
</body>
</html>
