<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The LeafNBeef SMP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* Custom cursor */
body{
  cursor: url('c8a6e23d-ccc5-4fae-ab26-9e189fe2c4ae.png'), auto;
  min-height:100vh;
  background: #0f2027;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  color: #fff;
  font-family: Inter,Segoe UI,Arial,sans-serif;
}

/* Minecraft-style subtle block animation */
.block {
  position: absolute;
  width: 30px;
  height: 30px;
  background: linear-gradient(145deg, #3a5a40, #4c7a57);
  opacity: 0.15;
  animation: floatBlocks 10s linear infinite;
}
@keyframes floatBlocks {
  0% {transform: translateY(100vh) translateX(0) rotate(0deg);}
  100% {transform: translateY(-100px) translateX(100px) rotate(360deg);}
}

*{box-sizing:border-box;margin:0;padding:0;}

.card{
  background:#111; /* fully opaque */
  border-radius:18px;
  padding:32px;
  max-width:420px;
  width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  text-align:center;
  z-index: 10; /* above background blocks */
  position: relative;
}

h1{font-size:28px;margin-bottom:10px;}
p{font-size:14px;opacity:.85;margin-bottom:24px;}
.buttons{display:flex;gap:12px;justify-content:center;}
a.button{
  text-decoration:none;
  padding:12px 20px;
  border-radius:12px;
  font-size:14px;
  transition:.25s;
  background:#1a73e8;
  color:#fff;
  cursor:pointer;
}
a.button:hover{background:#3b8cff; transform:translateY(-2px);}
footer{margin-top:24px;font-size:12px;opacity:.8;}

/* Pop-up modal */
#popup{
  display:none;
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  border-radius:14px;
  padding:24px;
  box-shadow:0 20px 50px rgba(0,0,0,0.7);
  z-index:1000;
  max-width:80%;
  opacity: 1; /* fully opaque */
}
#popup span.close{
  position:absolute;
  top:8px;
  right:12px;
  cursor:pointer;
  font-weight:bold;
  font-size:18px;
}
</style>
</head>
<body>

<!-- Minecraft-style blocks -->
<script>
for(let i=0;i<30;i++){
  const block = document.createElement('div');
  block.className = 'block';
  block.style.left = Math.random()*100 + 'vw';
  block.style.top = Math.random()*100 + 'vh';
  block.style.width = (20+Math.random()*20)+'px';
  block.style.height = (20+Math.random()*20)+'px';
  block.style.animationDuration = (8 + Math.random()*7)+'s';
  block.style.animationDelay = (Math.random()*5)+'s';
  document.body.appendChild(block);
}
</script>

<div class="card">
  <h1>The LeafNBeef SMP</h1>
  <p>A Simple vanilla-friendly Minecraft SMP</p>

  <div class="buttons">
    <a class="button" onclick="showPopup('test.ip Java 1.21.10')">What's the IP?</a>
  </div>

  <footer>Created by Jumpity</footer>
</div>

<div id="popup">
  <span class="close" onclick="closePopup()">×</span>
  <p id="popupText"></p>
</div>

<script>
// Pop-up functionality
function showPopup(text){
  document.getElementById('popupText').textContent = text;
  document.getElementById('popup').style.display = 'block';
}
function closePopup(){
  document.getElementById('popup').style.display = 'none';
}

// Auto-update (cache bust)
(function(){
  const links = document.getElementsByTagName('link');
  for(let i=0;i<links.length;i++){
    if(links[i].rel==='stylesheet'){
      links[i].href=links[i].href+'?v='+new Date().getTime();
    }
  }
  const scripts = document.getElementsByTagName('script');
  for(let i=0;i<scripts.length;i++){
    if(scripts[i].src){
      scripts[i].src = scripts[i].src+'?v='+new Date().getTime();
    }
  }
})();
</script>

</body>
</html>
